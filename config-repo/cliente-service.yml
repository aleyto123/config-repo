spring:
  application:
    name: cliente-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

mensaje:
  texto: Configuracion obtenida desde Config Server para Cliente Service

demo:
  cliente-delay-ms: 5000

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

resilience4j:
  circuitbreaker:
    instances:
      pedidoService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      pedidoRetry:
        maxAttempts: 3
        waitDuration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,retries
